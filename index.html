<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  
  <!-- ESSA LINHA É O SEGREDO DO MOBILE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Quer casar cmg?</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      padding: 20px;
    }

    .card {
      background: white;
      padding: 30px 20px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 350px;
      position: relative;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 25px;
      color: #333;
    }

    .botoes {
      display: flex;
      flex-direction: column; /* empilha no celular */
      gap: 15px;
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    #sim {
      background-color: #4CAF50;
      color: white;
    }

    #sim:active {
      transform: scale(0.95);
    }

    #nao {
      background-color: #f44336;
      color: white;
      position: absolute;
    }

    .mensagem {
      margin-top: 20px;
      font-size: 18px;
      color: #444;
      min-height: 24px;
    }

    /* MELHORIAS PRA TELAS MAIORES */
    @media (min-width: 500px) {
      .botoes {
        flex-direction: row;
      }

      button {
        width: auto;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Quer casar cmg? 💍</h1>

    <div class="botoes">
      <button id="sim" onclick="aceitou()">Sim 💖</button>
      <button id="nao" ontouchstart="fugir()" onmouseover="fugir()">Não 😢</button>
    </div>

    <div class="mensagem" id="msg"></div>
  </div>

  <script>
    function aceitou() {
      document.getElementById("msg").innerText = "Eu sabia 😍💍";
    }

    function fugir() {
      const botao = document.getElementById("nao");
      const card = document.querySelector(".card");

      const largura = card.clientWidth - 100;
      const altura = card.clientHeight - 50;

      const x = Math.random() * largura;
      const y = Math.random() * altura;

      botao.style.left = x + "px";
      botao.style.top = y + "px";
    }
  </script>

</body>
</html>
